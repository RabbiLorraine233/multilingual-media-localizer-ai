<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Media Localizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>Media Localizer</h1>
        <p>AI-Powered Content Adaptation</p>
    </header>

    <main class="app-container">
        
        <section class="input-section">
            <h2>1. Source Content</h2>
            <textarea id="sourceText" placeholder="Paste your original text here... (e.g., a new product announcement)"></textarea>
            
            <div class="api-config" style="margin-top: 15px; margin-bottom: 15px;">
                <input type="password" id="apiKeyInput" placeholder="Enter your AI API Key here (Secure & Local)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d2d2d7;">
                <p style="font-size: 12px; color: #86868b; margin-top: 5px;">Your key is never stored on any server.</p>
            </div>
            
            <div class="controls">
                <label for="languageSelect">Target Language:</label>
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="th">Thai (ภาษาไทย)</option>
                    <option value="id">Indonesian (Bahasa Indonesia)</option>
                </select>
                <button id="generateBtn" class="primary-btn">Generate</button>
            </div>
        </section>

        <section class="output-section">
            <h2>2. Localized Results</h2>
            <div id="resultsContainer" class="results-grid">
                <div class="empty-state">
                    <p>Your tailored content will appear here.</p>
                </div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
